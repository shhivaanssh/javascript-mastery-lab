<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Previewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0e0f11;
    --surface:     #16181c;
    --border:      #252830;
    --text:        #c9cdd6;
    --text-dim:    #555b6a;
    --accent:      #e8a44a;
    --accent-dim:  #7a4e1a;
    --green:       #5fb87c;
    --red:         #e05a5a;
    --blue:        #6ba6e8;
    --font-mono:   'JetBrains Mono', monospace;
    --font-prose:  'Instrument Serif', Georgia, serif;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 44px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .logo-mark {
    width: 22px;
    height: 22px;
    background: var(--accent);
    border-radius: 4px;
    display: grid;
    place-items: center;
    font-size: 11px;
    color: #000;
    font-weight: 500;
    flex-shrink: 0;
  }

  .header-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .btn {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }

  .wordcount {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    padding: 0 8px;
  }

  /* ── Main panes ── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── Editor pane ── */
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .pane + .pane {
    border-left: 1px solid var(--border);
  }

  .pane-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 34px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .pane-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pane-label::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  #editor-pane .pane-label::before { background: var(--accent); }
  #preview-pane .pane-label::before { background: var(--green); }

  .editor-wrap {
    position: relative;
    flex: 1;
    overflow: hidden;
  }

  #editor {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13.5px;
    line-height: 1.75;
    padding: 24px;
    border: none;
    outline: none;
    resize: none;
    overflow-y: auto;
    tab-size: 2;
    caret-color: var(--accent);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #editor::placeholder { color: var(--text-dim); }
  #editor::selection { background: color-mix(in srgb, var(--accent) 25%, transparent); }

  /* ── Preview pane ── */
  #preview {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    font-family: var(--font-prose);
  }

  /* ── Prose styles ── */
  #preview h1, #preview h2, #preview h3, #preview h4 {
    font-family: var(--font-prose);
    color: #e8e9ec;
    font-weight: 400;
    line-height: 1.25;
    margin-bottom: 0.5em;
    margin-top: 1.4em;
  }

  #preview h1 { font-size: 2em; font-style: italic; }
  #preview h2 { font-size: 1.45em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  #preview h3 { font-size: 1.15em; }
  #preview h4 { font-size: 1em; color: var(--accent); font-family: var(--font-mono); font-size: 0.85em; letter-spacing: 0.08em; text-transform: uppercase; }

  #preview p { line-height: 1.8; margin-bottom: 1em; font-size: 1.05em; color: var(--text); }

  #preview a { color: var(--blue); text-decoration: underline; text-underline-offset: 3px; }
  #preview a:hover { color: var(--accent); }

  #preview strong { color: #e8e9ec; font-weight: 700; font-family: var(--font-mono); font-size: 0.9em; }
  #preview em { color: #b8bcc8; font-style: italic; }

  #preview ul, #preview ol { padding-left: 1.5em; margin-bottom: 1em; }
  #preview li { line-height: 1.75; margin-bottom: 0.2em; }
  #preview li::marker { color: var(--accent); }

  #preview blockquote {
    border-left: 2px solid var(--accent);
    padding: 6px 0 6px 18px;
    margin: 1.2em 0;
    color: var(--text-dim);
    font-style: italic;
    font-size: 1.05em;
  }

  #preview code {
    font-family: var(--font-mono);
    font-size: 0.8em;
    background: var(--surface);
    color: var(--accent);
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }

  #preview pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 18px;
    margin-bottom: 1em;
    overflow-x: auto;
    position: relative;
  }

  #preview pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 0.85em;
    color: var(--text);
    line-height: 1.7;
  }

  #preview hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.8em 0;
  }

  #preview table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1em;
    font-family: var(--font-mono);
    font-size: 0.85em;
  }

  #preview th {
    background: var(--surface);
    color: var(--accent);
    text-align: left;
    padding: 8px 12px;
    border: 1px solid var(--border);
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-size: 0.8em;
  }

  #preview td {
    padding: 7px 12px;
    border: 1px solid var(--border);
    color: var(--text);
    vertical-align: top;
  }

  #preview tr:nth-child(even) td { background: color-mix(in srgb, var(--surface) 50%, transparent); }

  #preview img { max-width: 100%; border-radius: 4px; }

  /* ── Status bar ── */
  .statusbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    height: 26px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .status-item { display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }

  /* ── Divider handle ── */
  .divider {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.15s;
    position: relative;
  }

  .divider:hover { background: var(--accent); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Empty state ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 40px;
  }

  .empty-state svg { opacity: 0.2; }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #preview > * { animation: fadeIn 0.15s ease forwards; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">M↓</div>
    Markdown Previewer
  </div>
  <div class="header-actions">
    <span class="wordcount" id="wordcount">0 words</span>
    <button class="btn" id="btn-copy" title="Copy markdown">Copy MD</button>
    <button class="btn" id="btn-clear" title="Clear editor">Clear</button>
    <button class="btn" id="btn-example" title="Load example">Example</button>
  </div>
</header>

<div class="workspace">
  <div class="pane" id="editor-pane">
    <div class="pane-header">
      <span class="pane-label">Editor</span>
      <span style="font-size:10px;color:var(--text-dim)" id="char-count">0 chars</span>
    </div>
    <div class="editor-wrap">
      <textarea id="editor" spellcheck="false" placeholder="Start writing markdown..."></textarea>
    </div>
  </div>

  <div class="divider" id="divider"></div>

  <div class="pane" id="preview-pane">
    <div class="pane-header">
      <span class="pane-label">Preview</span>
      <span style="font-size:10px;color:var(--text-dim)" id="read-time">0 min read</span>
    </div>
    <div id="preview">
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span>Your preview will appear here</span>
      </div>
    </div>
  </div>
</div>

<div class="statusbar">
  <div class="status-item"><span class="status-dot"></span>Live Preview</div>
  <div class="status-item" id="status-saved">Auto-saved</div>
</div>

<script>
// ============================================================
// DOM concepts demonstrated in this file:
//   - querySelector, getElementById — selecting elements
//   - addEventListener — input, click, mousedown, mousemove, mouseup
//   - event.target, event.preventDefault
//   - element.innerHTML, element.textContent
//   - localStorage — auto-save and restore draft
//   - History API — URL hash sync
//   - FormData-style input reading via .value
//   - requestAnimationFrame — smooth pane resize
//   - Custom event dispatch
//   - DocumentFragment for batch DOM updates
//   - IntersectionObserver for read progress
// ============================================================


// --- Elements ---
const editor    = document.getElementById("editor");
const preview   = document.getElementById("preview");
const wordcount = document.getElementById("wordcount");
const charCount = document.getElementById("char-count");
const readTime  = document.getElementById("read-time");
const divider   = document.getElementById("divider");
const workspace = document.querySelector(".workspace");
const editorPane = document.getElementById("editor-pane");


// --- Minimal markdown parser (no dependencies) ---
function parseMarkdown(md) {
  if (!md.trim()) return "";

  let html = md
    // Escape HTML entities first
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  // Fenced code blocks — do these first so content inside isn't processed
  html = html.replace(/```(\w*)\n([\s\S]*?)```/gm, (_, lang, code) => {
    return `<pre><code class="lang-${lang}">${code.trimEnd()}</code></pre>`;
  });

  // Headings
  html = html.replace(/^#{6}\s(.+)$/gm, "<h6>$1</h6>");
  html = html.replace(/^#{5}\s(.+)$/gm, "<h5>$1</h5>");
  html = html.replace(/^#{4}\s(.+)$/gm, "<h4>$1</h4>");
  html = html.replace(/^#{3}\s(.+)$/gm, "<h3>$1</h3>");
  html = html.replace(/^#{2}\s(.+)$/gm, "<h2>$1</h2>");
  html = html.replace(/^#{1}\s(.+)$/gm, "<h1>$1</h1>");

  // Horizontal rule
  html = html.replace(/^[-*_]{3,}\s*$/gm, "<hr>");

  // Blockquote
  html = html.replace(/^&gt;\s(.+)$/gm, "<blockquote>$1</blockquote>");
  // Merge consecutive blockquotes
  html = html.replace(/<\/blockquote>\n<blockquote>/g, "\n");

  // Unordered lists
  html = html.replace(/((?:^[-*+]\s.+\n?)+)/gm, (match) => {
    const items = match.trim().split("\n")
      .map(line => `<li>${line.replace(/^[-*+]\s/, "")}</li>`)
      .join("");
    return `<ul>${items}</ul>`;
  });

  // Ordered lists
  html = html.replace(/((?:^\d+\.\s.+\n?)+)/gm, (match) => {
    const items = match.trim().split("\n")
      .map(line => `<li>${line.replace(/^\d+\.\s/, "")}</li>`)
      .join("");
    return `<ol>${items}</ol>`;
  });

  // Tables
  html = html.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/gm, (_, header, rows) => {
    const heads = header.split("|").filter(Boolean).map(h => `<th>${h.trim()}</th>`).join("");
    const body  = rows.trim().split("\n").map(row => {
      const cells = row.split("|").filter(Boolean).map(c => `<td>${c.trim()}</td>`).join("");
      return `<tr>${cells}</tr>`;
    }).join("");
    return `<table><thead><tr>${heads}</tr></thead><tbody>${body}</tbody></table>`;
  });

  // Inline: bold, italic, strikethrough, inline code
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
  html = html.replace(/~~(.+?)~~/g, "<del>$1</del>");
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");

  // Images before links
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Paragraphs — wrap lines not already in a block element
  const blocks = ["<h", "<ul", "<ol", "<li", "<blockquote", "<pre", "<hr", "<table", "<thead", "<tbody", "<tr", "<th", "<td", "<img"];
  html = html.split("\n\n").map(para => {
    para = para.trim();
    if (!para) return "";
    const isBlock = blocks.some(tag => para.startsWith(tag));
    return isBlock ? para : `<p>${para.replace(/\n/g, "<br>")}</p>`;
  }).join("\n");

  return html;
}


// --- Render ---
let renderTimer = null;

function render() {
  const md = editor.value;

  // Stats
  const words = md.trim() ? md.trim().split(/\s+/).length : 0;
  const chars = md.length;
  const mins  = Math.max(1, Math.round(words / 200));

  wordcount.textContent = `${words} word${words !== 1 ? "s" : ""}`;
  charCount.textContent = `${chars} char${chars !== 1 ? "s" : ""}`;
  readTime.textContent  = words > 0 ? `${mins} min read` : "0 min read";

  // Render
  if (!md.trim()) {
    preview.innerHTML = `
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span>Your preview will appear here</span>
      </div>`;
    return;
  }

  preview.innerHTML = parseMarkdown(md);
}


// --- Debounced render on input ---
editor.addEventListener("input", () => {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 80);
  saveDebounced();
});


// --- localStorage auto-save ---
const DRAFT_KEY = "md-previewer-draft";

function save() {
  localStorage.setItem(DRAFT_KEY, editor.value);
  const status = document.getElementById("status-saved");
  status.textContent = `Saved ${new Date().toLocaleTimeString()}`;
}

let saveTimer;
function saveDebounced() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 600);
}

// Restore draft on load
const saved = localStorage.getItem(DRAFT_KEY);
if (saved) {
  editor.value = saved;
  render();
}


// --- Button actions ---
document.getElementById("btn-copy").addEventListener("click", () => {
  navigator.clipboard.writeText(editor.value).then(() => {
    const btn = document.getElementById("btn-copy");
    btn.textContent = "Copied!";
    btn.classList.add("active");
    setTimeout(() => {
      btn.textContent = "Copy MD";
      btn.classList.remove("active");
    }, 1500);
  });
});

document.getElementById("btn-clear").addEventListener("click", () => {
  if (!editor.value || confirm("Clear the editor?")) {
    editor.value = "";
    render();
    localStorage.removeItem(DRAFT_KEY);
    editor.focus();
  }
});

document.getElementById("btn-example").addEventListener("click", () => {
  editor.value = EXAMPLE_MD;
  render();
  save();
  editor.focus();
});


// --- Resizable panes with mousedown/mousemove/mouseup ---
let isResizing = false;
let startX = 0;
let startWidth = 0;

divider.addEventListener("mousedown", (e) => {
  isResizing = true;
  startX     = e.clientX;
  startWidth = editorPane.offsetWidth;
  document.body.style.cursor = "col-resize";
  document.body.style.userSelect = "none";
});

document.addEventListener("mousemove", (e) => {
  if (!isResizing) return;
  requestAnimationFrame(() => {
    const delta    = e.clientX - startX;
    const newWidth = Math.min(Math.max(startWidth + delta, 200), workspace.offsetWidth - 200);
    editorPane.style.flex = "none";
    editorPane.style.width = newWidth + "px";
  });
});

document.addEventListener("mouseup", () => {
  if (!isResizing) return;
  isResizing = false;
  document.body.style.cursor = "";
  document.body.style.userSelect = "";
});


// --- Tab key support in textarea ---
editor.addEventListener("keydown", (e) => {
  if (e.key === "Tab") {
    e.preventDefault();
    const start = editor.selectionStart;
    const end   = editor.selectionEnd;
    editor.value = editor.value.slice(0, start) + "  " + editor.value.slice(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
  }
});


// --- Keyboard shortcut: Ctrl/Cmd + S to save ---
document.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "s") {
    e.preventDefault();
    save();
  }
});


// --- Example content ---
const EXAMPLE_MD = `# JavaScript Mastery Lab

*A structured journey from fundamentals to backend engineering.*

## Why document your learning?

Writing about what you learn **forces clarity**. If you can't explain it, you don't know it yet. This repo is both a reference and proof of progress.

## Roadmap

| Module | Topic | Status |
|--------|-------|--------|
| 01 | Basics | ✅ Done |
| 02 | Functions & Scope | ✅ Done |
| 03 | Arrays & Objects | ✅ Done |
| 04 | ES6+ | ✅ Done |
| 05 | Async JS | ✅ Done |
| 06 | DOM & Browser | 🔄 In Progress |

## Things that clicked this week

> Closures aren't a trick — they're just functions that remember where they were born.

The moment it made sense was writing this:

\`\`\`js
function makeCounter(start = 0) {
  let count = start;
  return {
    increment: () => ++count,
    value:     () => count,
  };
}

const c = makeCounter(10);
c.increment(); // 11
c.value();     // 11
\`\`\`

The \`count\` variable lives in the closure — private and persistent.

## Key takeaways

- **Event loop**: microtasks run before macrotasks, always
- **Async/await** is syntax sugar — it's still Promises underneath
- \`?.\ ` &&`??\` eliminate most defensive coding boilerplate
- \`structuredClone\` for deep copies, spread for shallow

---

*Built in public. Learned by doing.*`;
</script>
</body>
</html>

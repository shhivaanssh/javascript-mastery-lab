<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevNotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Berkeley+Mono&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:        #0b0c0e;
  --surface:   #111316;
  --surface2:  #171a1e;
  --border:    #222529;
  --border2:   #2e3238;
  --text:      #c8cdd6;
  --text-dim:  #4e5562;
  --text-mid:  #8892a0;
  --accent:    #d4a017;
  --accent-dim:#6b500a;
  --green:     #4ade80;
  --red:       #f87171;
  --blue:      #60a5fa;
  --mono:      'Berkeley Mono', 'Fira Code', monospace;
  --serif:     'Instrument Serif', Georgia, serif;
}

html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--mono); font-size:13px; overflow:hidden; }

/* ── Layout ── */
#app { display:grid; grid-template-columns:220px 320px 1fr; height:100vh; }

/* ── Sidebar ── */
#sidebar {
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.sidebar-header {
  padding:18px 16px 14px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.logo {
  font-size:11px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--accent);
  font-weight:400;
  display:flex;
  align-items:center;
  gap:8px;
}

.logo-mark {
  width:20px; height:20px;
  background:var(--accent);
  border-radius:3px;
  display:grid;
  place-items:center;
  font-size:10px;
  color:#000;
  font-weight:700;
  flex-shrink:0;
}

.sidebar-section {
  padding:12px 14px 6px;
  font-size:9px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--text-dim);
}

#tag-list {
  overflow-y:auto;
  flex:1;
  padding:4px 8px 12px;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}

.tag-item {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:5px 8px;
  border-radius:4px;
  cursor:pointer;
  transition:background 0.1s;
  gap:6px;
}

.tag-item:hover { background:var(--surface2); }
.tag-item.active { background:color-mix(in srgb, var(--accent) 12%, transparent); }
.tag-item.active .tag-name { color:var(--accent); }

.tag-name {
  color:var(--text-mid);
  font-size:12px;
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.tag-name::before { content:'#'; color:var(--accent-dim); margin-right:1px; }
.tag-item.active .tag-name::before { color:var(--accent); }

.tag-count {
  font-size:10px;
  color:var(--text-dim);
  background:var(--surface2);
  padding:1px 5px;
  border-radius:3px;
  flex-shrink:0;
}

.tag-all {
  display:flex;
  align-items:center;
  gap:6px;
  padding:6px 8px;
  cursor:pointer;
  border-radius:4px;
  color:var(--text-mid);
  font-size:12px;
  margin-bottom:4px;
  transition:background 0.1s;
}

.tag-all:hover { background:var(--surface2); }
.tag-all.active { color:var(--accent); }

.sidebar-footer {
  padding:12px 16px;
  border-top:1px solid var(--border);
  font-size:10px;
  color:var(--text-dim);
  flex-shrink:0;
}

/* ── Note list ── */
#list-pane {
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}

.list-header {
  padding:12px 14px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.search-wrap {
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:5px;
  padding:7px 10px;
  transition:border-color 0.15s;
}

.search-wrap:focus-within { border-color:var(--accent-dim); }

.search-icon { color:var(--text-dim); font-size:11px; flex-shrink:0; }

#search-input {
  background:none;
  border:none;
  outline:none;
  color:var(--text);
  font-family:var(--mono);
  font-size:12px;
  flex:1;
  caret-color:var(--accent);
}

#search-input::placeholder { color:var(--text-dim); }

.list-meta {
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.list-count { font-size:10px; color:var(--text-dim); }

.btn-new {
  font-family:var(--mono);
  font-size:10px;
  background:var(--accent);
  color:#000;
  border:none;
  border-radius:3px;
  padding:4px 9px;
  cursor:pointer;
  letter-spacing:0.05em;
  transition:opacity 0.15s;
}

.btn-new:hover { opacity:0.85; }

#notes-list {
  overflow-y:auto;
  flex:1;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}

.note-card {
  padding:13px 16px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background 0.1s;
  position:relative;
}

.note-card:hover { background:var(--surface); }
.note-card.active { background:var(--surface2); }
.note-card.active::before {
  content:'';
  position:absolute;
  left:0; top:0; bottom:0;
  width:2px;
  background:var(--accent);
}

.note-card-title {
  font-size:12.5px;
  color:var(--text);
  margin-bottom:5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  display:flex;
  align-items:center;
  gap:6px;
}

.pin-icon { color:var(--accent); font-size:9px; flex-shrink:0; }

.note-card-body {
  font-size:10.5px;
  color:var(--text-dim);
  margin-bottom:7px;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  line-clamp:2;
  -webkit-box-orient:vertical;
  line-height:1.5;
}

.note-card-footer {
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}

.lang-badge {
  font-size:9px;
  padding:1px 5px;
  border-radius:3px;
  background:var(--surface2);
  color:var(--blue);
  border:1px solid var(--border2);
  letter-spacing:0.05em;
}

.card-tag {
  font-size:9px;
  color:var(--text-dim);
}

.card-tag::before { content:'#'; }

.note-date {
  margin-left:auto;
  font-size:9px;
  color:var(--text-dim);
  flex-shrink:0;
}

.empty-state {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  gap:10px;
  color:var(--text-dim);
  font-size:11px;
  text-align:center;
  padding:32px;
}

/* ── Preview pane ── */
#preview-pane {
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}

.preview-header {
  padding:10px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
  min-height:46px;
}

.preview-title {
  font-family:var(--serif);
  font-size:15px;
  color:var(--text);
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.preview-actions { display:flex; gap:6px; flex-shrink:0; }

.btn-icon {
  font-family:var(--mono);
  font-size:10px;
  background:transparent;
  border:1px solid var(--border2);
  color:var(--text-dim);
  border-radius:3px;
  padding:4px 9px;
  cursor:pointer;
  transition:all 0.1s;
}

.btn-icon:hover { border-color:var(--text-mid); color:var(--text); }
.btn-icon.danger:hover { border-color:var(--red); color:var(--red); }

#preview-body {
  overflow-y:auto;
  flex:1;
  padding:28px 32px;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}

/* Prose styles */
#preview-body h1 { font-family:var(--serif); font-size:1.8em; font-style:italic; color:#e2e6ed; font-weight:400; margin:0 0 0.5em; }
#preview-body h2 { font-family:var(--serif); font-size:1.3em; color:#e2e6ed; font-weight:400; margin:1.4em 0 0.4em; border-bottom:1px solid var(--border); padding-bottom:0.3em; }
#preview-body h3 { font-size:0.9em; color:var(--accent); letter-spacing:0.08em; text-transform:uppercase; margin:1.2em 0 0.3em; }
#preview-body p  { color:var(--text); line-height:1.8; margin-bottom:0.9em; font-size:13px; }
#preview-body a  { color:var(--blue); }
#preview-body strong { color:#e2e6ed; }
#preview-body em { color:var(--text-mid); font-style:italic; }
#preview-body ul,#preview-body ol { padding-left:1.4em; margin-bottom:0.9em; }
#preview-body li { line-height:1.75; color:var(--text); margin-bottom:0.1em; }
#preview-body li::marker { color:var(--accent); }
#preview-body blockquote { border-left:2px solid var(--accent-dim); padding:4px 0 4px 16px; color:var(--text-mid); margin:1em 0; font-style:italic; }
#preview-body hr { border:none; border-top:1px solid var(--border); margin:1.5em 0; }

#preview-body code {
  font-family:var(--mono);
  font-size:0.82em;
  background:var(--surface2);
  color:var(--accent);
  padding:1px 5px;
  border-radius:3px;
  border:1px solid var(--border);
}

#preview-body pre {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:5px;
  padding:14px 16px;
  margin:0.8em 0 1em;
  overflow-x:auto;
  position:relative;
}

#preview-body pre::before {
  content:attr(data-lang);
  position:absolute;
  top:8px; right:12px;
  font-size:9px;
  color:var(--text-dim);
  letter-spacing:0.1em;
  text-transform:uppercase;
}

#preview-body pre code {
  background:none;
  border:none;
  padding:0;
  color:var(--text);
  font-size:12px;
  line-height:1.7;
}

/* Note metadata bar */
.note-meta-bar {
  padding:10px 20px;
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  flex-shrink:0;
  font-size:10px;
  color:var(--text-dim);
  background:var(--surface);
}

.meta-lang { color:var(--blue); }
.meta-tag::before { content:'#'; color:var(--accent-dim); }
.meta-date { margin-left:auto; }
.meta-source a { color:var(--text-dim); }

/* Empty preview */
.preview-empty {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  gap:8px;
  color:var(--text-dim);
  font-size:11px;
}

/* Modal */
.modal-backdrop {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:grid;
  place-items:center;
  z-index:100;
  padding:24px;
}

.modal {
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:8px;
  width:min(600px, 100%);
  max-height:90vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.modal-header {
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.modal-title {
  font-size:12px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text-mid);
}

.modal-close {
  background:none;
  border:none;
  color:var(--text-dim);
  cursor:pointer;
  font-size:16px;
  line-height:1;
  padding:2px 6px;
}

.modal-close:hover { color:var(--text); }

.modal-body {
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:14px;
  flex:1;
}

.field label {
  display:block;
  font-size:9px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--text-dim);
  margin-bottom:5px;
}

.field input,
.field textarea,
.field select {
  width:100%;
  background:var(--bg);
  border:1px solid var(--border2);
  border-radius:4px;
  padding:8px 10px;
  color:var(--text);
  font-family:var(--mono);
  font-size:12px;
  outline:none;
  transition:border-color 0.15s;
  resize:vertical;
}

.field input:focus,
.field textarea:focus,
.field select:focus { border-color:var(--accent-dim); }

.field textarea { min-height:160px; line-height:1.6; }

.field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

.modal-footer {
  padding:14px 20px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:flex-end;
  gap:8px;
}

.btn-cancel {
  font-family:var(--mono);
  font-size:11px;
  background:transparent;
  border:1px solid var(--border2);
  color:var(--text-dim);
  border-radius:4px;
  padding:7px 16px;
  cursor:pointer;
  transition:all 0.1s;
}

.btn-cancel:hover { border-color:var(--text-mid); color:var(--text); }

.btn-save {
  font-family:var(--mono);
  font-size:11px;
  background:var(--accent);
  color:#000;
  border:none;
  border-radius:4px;
  padding:7px 18px;
  cursor:pointer;
  transition:opacity 0.1s;
}

.btn-save:hover { opacity:0.85; }

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--text);
  font-size:11px;
  padding:8px 18px;
  border-radius:5px;
  opacity:0;
  transition:all 0.2s;
  pointer-events:none;
  z-index:200;
}

.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.error { border-color:var(--red); color:var(--red); }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
</style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-mark">DN</div>
        DevNotes
      </div>
    </div>
    <div class="sidebar-section">Tags</div>
    <div id="tag-list">
      <div class="tag-all active" data-tag="">
        <span>All notes</span>
      </div>
    </div>
    <div class="sidebar-footer" id="sidebar-footer">Loading...</div>
  </aside>

  <!-- Note list -->
  <section id="list-pane">
    <div class="list-header">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="search-input" type="text" placeholder="Search notes..." autocomplete="off" spellcheck="false">
      </div>
      <div class="list-meta">
        <span class="list-count" id="list-count">—</span>
        <button class="btn-new" id="btn-new">+ New note</button>
      </div>
    </div>
    <div id="notes-list">
      <div class="empty-state">Loading...</div>
    </div>
  </section>

  <!-- Preview -->
  <section id="preview-pane">
    <div class="preview-header">
      <span class="preview-title" id="preview-title"></span>
      <div class="preview-actions" id="preview-actions" style="display:none">
        <button class="btn-icon" id="btn-edit">Edit</button>
        <button class="btn-icon" id="btn-pin">Pin</button>
        <button class="btn-icon danger" id="btn-delete">Delete</button>
      </div>
    </div>
    <div id="preview-body">
      <div class="preview-empty">
        <div style="font-size:28px;opacity:0.15">◈</div>
        <div>Select a note to preview</div>
      </div>
    </div>
    <div class="note-meta-bar" id="note-meta" style="display:none"></div>
  </section>
</div>

<!-- New / Edit modal -->
<div class="modal-backdrop" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">New Note</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Title *</label>
        <input id="f-title" type="text" placeholder="Note title..." autocomplete="off">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Language</label>
          <input id="f-lang" type="text" placeholder="javascript, python, bash...">
        </div>
        <div class="field">
          <label>Tags (comma separated)</label>
          <input id="f-tags" type="text" placeholder="arrays, promises, snippet">
        </div>
      </div>
      <div class="field">
        <label>Body (Markdown)</label>
        <textarea id="f-body" placeholder="Write your note in Markdown..."></textarea>
      </div>
      <div class="field">
        <label>Source URL (optional)</label>
        <input id="f-source" type="text" placeholder="https://...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-save" id="btn-save">Save note</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';

// ── State ──────────────────────────────────────────
let state = {
  notes:      [],
  tags:       [],
  activeTag:  '',
  query:      '',
  activeNote: null,
  editingId:  null,
  total:      0,
};

// ── API helpers ────────────────────────────────────
async function apiFetch(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body:    body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 204) return null;
  return res.json();
}

// ── Toast ──────────────────────────────────────────
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2200);
}

// ── Markdown parser (no deps) ───────────────────────
function parseMarkdown(md) {
  if (!md?.trim()) return '';

  let html = md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Fenced code blocks
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/gm, (_, lang, code) =>
    `<pre data-lang="${lang}"><code>${code.trim()}</code></pre>`
  );

  // Headings
  html = html
    .replace(/^#{6} (.+)$/gm, '<h6>$1</h6>')
    .replace(/^#{5} (.+)$/gm, '<h5>$1</h5>')
    .replace(/^#{4} (.+)$/gm, '<h4>$1</h4>')
    .replace(/^#{3} (.+)$/gm, '<h3>$1</h3>')
    .replace(/^#{2} (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm,    '<h1>$1</h1>');

  // HR
  html = html.replace(/^[-*_]{3,}\s*$/gm, '<hr>');

  // Blockquote
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');

  // Lists
  html = html.replace(/((?:^[-*+] .+\n?)+)/gm, m =>
    '<ul>' + m.trim().split('\n').map(l => `<li>${l.replace(/^[-*+] /, '')}</li>`).join('') + '</ul>'
  );
  html = html.replace(/((?:^\d+\. .+\n?)+)/gm, m =>
    '<ol>' + m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('') + '</ol>'
  );

  // Inline
  html = html
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,         '<em>$1</em>')
    .replace(/~~(.+?)~~/g,         '<del>$1</del>')
    .replace(/`([^`]+)`/g,         '<code>$1</code>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" style="max-width:100%">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,  '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Paragraphs
  const blocks = ['<h','<ul','<ol','<li','<blockquote','<pre','<hr','<img'];
  html = html.split('\n\n').map(para => {
    para = para.trim();
    if (!para) return '';
    return blocks.some(b => para.startsWith(b)) ? para : `<p>${para.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');

  return html;
}

// ── Render helpers ────────────────────────────────
function relativeTime(dateStr) {
  const diff = Date.now() - new Date(dateStr + 'Z').getTime();
  const m = Math.floor(diff / 60000);
  const h = Math.floor(diff / 3600000);
  const d = Math.floor(diff / 86400000);
  if (m < 1)   return 'just now';
  if (m < 60)  return `${m}m ago`;
  if (h < 24)  return `${h}h ago`;
  if (d < 30)  return `${d}d ago`;
  return new Date(dateStr).toLocaleDateString();
}

// ── Load data ─────────────────────────────────────
async function loadTags() {
  const res = await apiFetch('GET', '/tags');
  state.tags = res?.data ?? [];
  renderTagList();
}

async function loadNotes() {
  const params = new URLSearchParams();
  if (state.query)     params.set('q',   state.query);
  if (state.activeTag) params.set('tag', state.activeTag);
  params.set('limit', '100');

  const res    = await apiFetch('GET', `/notes?${params}`);
  state.notes  = res?.data ?? [];
  state.total  = res?.meta?.total ?? 0;
  renderNoteList();
}

// ── Render tag list ───────────────────────────────
function renderTagList() {
  const list = document.getElementById('tag-list');
  const allActive = !state.activeTag;

  list.innerHTML = `
    <div class="tag-all ${allActive ? 'active' : ''}" data-tag="">
      <span>All notes</span>
    </div>
  ` + state.tags.map(t => `
    <div class="tag-item ${state.activeTag === t.name ? 'active' : ''}" data-tag="${t.name}">
      <span class="tag-name">${t.name}</span>
      <span class="tag-count">${t.count}</span>
    </div>
  `).join('');

  list.querySelectorAll('[data-tag]').forEach(el => {
    el.addEventListener('click', () => {
      state.activeTag = el.dataset.tag;
      loadNotes();
      renderTagList();
    });
  });

  document.getElementById('sidebar-footer').textContent =
    `${state.tags.length} tag${state.tags.length !== 1 ? 's' : ''} · ${state.total} note${state.total !== 1 ? 's' : ''}`;
}

// ── Render note list ──────────────────────────────
function renderNoteList() {
  const container = document.getElementById('notes-list');
  document.getElementById('list-count').textContent =
    `${state.notes.length} note${state.notes.length !== 1 ? 's' : ''}` +
    (state.query ? ` for "${state.query}"` : '') +
    (state.activeTag ? ` tagged #${state.activeTag}` : '');

  if (!state.notes.length) {
    container.innerHTML = `<div class="empty-state">
      <div style="font-size:24px;opacity:0.2">◈</div>
      <div>${state.query || state.activeTag ? 'No notes match' : 'No notes yet'}</div>
      ${!state.query && !state.activeTag ? '<div style="margin-top:4px;opacity:0.6">Click "+ New note" to start</div>' : ''}
    </div>`;
    return;
  }

  container.innerHTML = state.notes.map(n => {
    const isActive = state.activeNote?.id === n.id;
    const tags = (n.tags ?? []).slice(0, 3).map(t => `<span class="card-tag">${t}</span>`).join('');
    const bodyPreview = (n.body || '').replace(/[#*`\[\]]/g, '').trim().slice(0, 80);
    return `
      <div class="note-card ${isActive ? 'active' : ''}" data-id="${n.id}">
        <div class="note-card-title">
          ${n.pinned ? '<span class="pin-icon">★</span>' : ''}
          ${n.title}
        </div>
        ${bodyPreview ? `<div class="note-card-body">${bodyPreview}</div>` : ''}
        <div class="note-card-footer">
          ${n.language ? `<span class="lang-badge">${n.language}</span>` : ''}
          ${tags}
          <span class="note-date">${relativeTime(n.updated_at)}</span>
        </div>
      </div>
    `;
  }).join('');

  container.querySelectorAll('.note-card').forEach(el => {
    el.addEventListener('click', () => {
      const note = state.notes.find(n => n.id === Number(el.dataset.id));
      selectNote(note);
    });
  });
}

// ── Select and render a note ──────────────────────
function selectNote(note) {
  state.activeNote = note;
  renderNoteList();

  document.getElementById('preview-title').textContent = note.title;
  document.getElementById('preview-actions').style.display = 'flex';
  document.getElementById('preview-body').innerHTML = parseMarkdown(note.body) ||
    '<p style="color:var(--text-dim);font-style:italic">No content yet. Click Edit to add some.</p>';

  // Pin button label
  document.getElementById('btn-pin').textContent = note.pinned ? 'Unpin' : 'Pin';

  // Meta bar
  const meta = document.getElementById('note-meta');
  meta.style.display = 'flex';
  const tags = (note.tags ?? []).map(t => `<span class="meta-tag">${t}</span>`).join('');
  meta.innerHTML = `
    ${note.language ? `<span class="meta-lang">${note.language}</span>` : ''}
    ${tags}
    ${note.source ? `<span>· <a class="meta-source" href="${note.source}" target="_blank">source ↗</a></span>` : ''}
    <span class="meta-date">${new Date(note.updated_at).toLocaleString()}</span>
  `;
}

// ── Modal ─────────────────────────────────────────
function openModal(note = null) {
  state.editingId = note?.id ?? null;
  document.getElementById('modal-title').textContent = note ? 'Edit Note' : 'New Note';
  document.getElementById('f-title').value  = note?.title    ?? '';
  document.getElementById('f-lang').value   = note?.language ?? '';
  document.getElementById('f-tags').value   = (note?.tags ?? []).join(', ');
  document.getElementById('f-body').value   = note?.body     ?? '';
  document.getElementById('f-source').value = note?.source   ?? '';
  document.getElementById('modal').style.display = 'grid';
  document.getElementById('f-title').focus();
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  state.editingId = null;
}

async function saveNote() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('Title is required', true); return; }

  const payload = {
    title,
    body:     document.getElementById('f-body').value.trim(),
    language: document.getElementById('f-lang').value.trim().toLowerCase(),
    source:   document.getElementById('f-source').value.trim(),
    tags:     document.getElementById('f-tags').value
      .split(',').map(t => t.trim()).filter(Boolean),
  };

  const method = state.editingId ? 'PUT' : 'POST';
  const path   = state.editingId ? `/notes/${state.editingId}` : '/notes';

  const res = await apiFetch(method, path, payload);

  if (!res?.ok) {
    toast(res?.error ?? 'Failed to save', true);
    return;
  }

  closeModal();
  toast(state.editingId ? 'Note updated' : 'Note created');
  await Promise.all([loadNotes(), loadTags()]);
  selectNote(res.data);
}

// ── Wire up events ────────────────────────────────
document.getElementById('btn-new').addEventListener('click', () => openModal());
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('btn-save').addEventListener('click', saveNote);

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.getElementById('btn-edit').addEventListener('click', () => {
  if (state.activeNote) openModal(state.activeNote);
});

document.getElementById('btn-pin').addEventListener('click', async () => {
  if (!state.activeNote) return;
  const res = await apiFetch('PUT', `/notes/${state.activeNote.id}`, {
    pinned: !state.activeNote.pinned,
  });
  if (res?.ok) {
    toast(res.data.pinned ? 'Pinned' : 'Unpinned');
    await loadNotes();
    selectNote(res.data);
  }
});

document.getElementById('btn-delete').addEventListener('click', async () => {
  if (!state.activeNote) return;
  if (!confirm(`Delete "${state.activeNote.title}"?`)) return;
  await apiFetch('DELETE', `/notes/${state.activeNote.id}`);
  toast('Note deleted');
  state.activeNote = null;
  document.getElementById('preview-actions').style.display = 'none';
  document.getElementById('preview-title').textContent = '';
  document.getElementById('preview-body').innerHTML =
    '<div class="preview-empty"><div style="font-size:28px;opacity:0.15">◈</div><div>Select a note to preview</div></div>';
  document.getElementById('note-meta').style.display = 'none';
  await Promise.all([loadNotes(), loadTags()]);
});

// Search — debounced
let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.query = e.target.value.trim();
    loadNotes();
  }, 250);
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); openModal(); }
  if (e.key === 'Escape' && document.getElementById('modal').style.display !== 'none') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' &&
      document.getElementById('modal').style.display !== 'none') {
    e.preventDefault(); saveNote();
  }
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT' &&
      document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
});

// ── Init ──────────────────────────────────────────
await Promise.all([loadNotes(), loadTags()]);
</script>
</body>
</html>
